spring:
  datasource:
    url: jdbc:mysql://prod-server:3306/demo_backend?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false               # 生产环境关掉 SQL 日志

logging:
  level:
    com.demo: INFO                 # 生产环境 INFO 级别就够了