server:
  port: 8081

spring:
  application:
    name: demo-backend

  # 默认激活 dev 环境
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 全局日志级别
logging:
  level:
    com.demo: DEBUG
    org.springframework: INFO
# Actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always